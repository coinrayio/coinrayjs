name: Deploy docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Build the library first so the docs site's `coinrayjs` (file:..) dep resolves.
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: Build docs site
        working-directory: website
        run: |
          yarn install --frozen-lockfile
          yarn build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build
      - id: deploy
        uses: actions/deploy-pages@v4
